<!DOCTYPE html>
<html>

<head>

    <title>Maintenance Mode</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8fafc;
            font-family:Arial;
        }

        .box{
            background:white;
            padding:60px;
            border-radius:24px;
            text-align:center;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
            max-width:600px;
        }

        h1{
            color:#dc2626;
            font-size:42px;
        }

        p{
            color:#64748b;
            font-size:18px;
            line-height:1.8;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>
            ERP Under Maintenance
        </h1>

        <p>
            {{ message }}
        </p>

    </div>

</body>

</html>
