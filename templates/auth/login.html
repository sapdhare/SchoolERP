{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<section class="login-page">

    <div class="login-container">

        <!-- LEFT SIDE -->
  <div class="login-left">

    <!-- TEXT -->
    <div class="left-content">
        <h2>
        {{ global_settings.system_name or "SchoolSphere" }}
        </h2>
        <h1>Smart School ERP</h1>
        <p>
            Manage TC, marksheets and complete school operations with ease.
        </p>
    </div>

    <!-- SVG IMAGE -->
    <img src="{{ url_for('static', filename='images/student_login.png') }}" class="student-svg" alt="School ERP Login">

    <!-- DOT PATTERN -->
    <div class="dots1"></div>
    <div class="dots2"></div>

</div>
        <!-- RIGHT SIDE -->
        <div class="login-right">

            <div class="login-box">

                <h2>Welcome Back 👋</h2>
                        <p class="login-sub">
            Login to your school dashboard<br>
            <span style="font-size:12px; color:#64748B;">
                आपल्या शाळेच्या डॅशबोर्डमध्ये लॉगिन करा
            </span>
        </p>

                <!-- ROLE TABS -->
                <!-- <div class="login-tabs"  method="POST" action="/login">
                    <button class="active" type="button" data-role="admin">Admin</button>
                    <button type="button" data-role="teacher">Teacher</button>
                    <button type="button" data-role="student">Student</button>
                </div> -->

                <!-- FORM -->
                 <form class="login-form" method="POST" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">


                    <!-- EMAIL -->
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="Enter Email (ईमेल)" 
                        autocomplete="email"
                        maxlength="120"
                        required
                    >

                    <!-- PASSWORD -->
                    <div class="password-field">

                        <input 
                            type="password"
                            name="password"
                            id="password"
                            placeholder="Enter Password (पासवर्ड)"
                            autocomplete="current-password"
                            maxlength="100"
                            required
                        >

                        <span
                            class="toggle-password"
                            onclick="togglePassword()">

                            👁

                        </span>

                    </div>

                    <button
                        type="submit"
                        class="btn-login"
                        id="loginBtn"
                    >

                        <span class="btn-text">
                            Login
                        </span>

                        <span class="btn-loader"></span>

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

<!-- JavaScript -->

<script>

/* =========================================
   PASSWORD TOGGLE
========================================= */

function togglePassword(){

    const passwordInput =
        document.getElementById("password");

    if(passwordInput.type === "password"){

        passwordInput.type = "text";

    }else{

        passwordInput.type = "password";
    }

}


/* =========================================
   LOGIN LOADER
========================================= */

document.querySelector(".login-form")
.addEventListener("submit", function(){

    const btn =
        document.getElementById("loginBtn");
     

    btn.disabled = true;
    btn.classList.add("loading");

});

</script>

{% endblock %}
