{% extends "dashboard/dashboard_base.html" %}

{% block content %}

<style>
.coming-page{
    min-height:calc(100vh - 80px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.coming-card{
    position:relative;
    overflow:hidden;
    width:100%;
    max-width:760px;
    padding:46px;
    border-radius:30px;
    background:rgba(255,255,255,.92);
    border:1px solid rgba(20,184,166,.18);
    box-shadow:0 25px 70px rgba(15,23,42,.10);
    text-align:center;
}

.coming-card::after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    right:-85px;
    top:-90px;
    border-radius:50%;
    background:rgba(20,184,166,.10);
}

.coming-badge-top{
    display:inline-flex;
    padding:8px 15px;
    border-radius:999px;
    background:#ecfeff;
    color:#0f766e;
    font-size:12px;
    font-weight:900;
    margin-bottom:18px;
}

.coming-icon{
    width:82px;
    height:82px;
    margin:0 auto 18px;
    border-radius:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#14b8a6,#06b6d4);
    color:#fff;
    font-size:34px;
    box-shadow:0 18px 35px rgba(20,184,166,.28);
}

.coming-card h1{
    margin:0;
    font-size:32px;
    font-weight:900;
    color:#0f172a;
}

.coming-card p{
    margin-top:12px;
    color:#64748b;
    font-size:15px;
    line-height:1.7;
}

.coming-card p span{
    color:#94a3b8;
}

.coming-progress{
    width:100%;
    max-width:360px;
    height:8px;
    margin:28px auto 0;
    background:#e2e8f0;
    border-radius:999px;
    overflow:hidden;
}

.coming-progress span{
    display:block;
    width:55%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(135deg,#14b8a6,#06b6d4);
    animation:loadingMove 1.8s infinite ease-in-out;
}

.coming-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:24px;
    padding:12px 20px;
    border-radius:999px;
    background:#0f172a;
    color:#fff;
    font-size:13px;
    font-weight:900;
}

.coming-actions{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:24px;
}

.coming-actions a{
    text-decoration:none;
    padding:12px 18px;
    border-radius:14px;
    font-size:13px;
    font-weight:900;
}

.btn-back-dashboard{
    background:#f1f5f9;
    color:#475569;
}

.btn-contact-admin{
    background:linear-gradient(135deg,#14b8a6,#0f766e);
    color:#fff;
}

@keyframes loadingMove{
    0%{width:25%;}
    50%{width:70%;}
    100%{width:25%;}
}

@media(max-width:576px){
    .coming-page{
        padding:18px;
        align-items:flex-start;
        padding-top:35px;
    }

    .coming-card{
        padding:28px 20px;
        border-radius:24px;
    }

    .coming-icon{
        width:68px;
        height:68px;
        font-size:28px;
    }

    .coming-card h1{
        font-size:24px;
    }

    .coming-card p{
        font-size:13px;
    }

    .coming-actions{
        flex-direction:column;
    }

    .coming-actions a{
        width:100%;
    }
}
</style>

<div class="coming-page">

    <div class="coming-card">

        <div class="coming-badge-top">
            🚧 Module Under Development
        </div>

        <div class="coming-icon">
            ⚙️
        </div>

        <h1>{{ feature }}</h1>

        <p>
            This module is currently under development and will be available soon.
            <br>
            <span>हा module सध्या तयार होत आहे आणि लवकरच उपलब्ध होईल.</span>
        </p>

        <div class="coming-progress">
            <span></span>
        </div>

        <div class="coming-status">
            🚀 Coming Soon
        </div>

        <div class="coming-actions">
            <a href="{{ url_for('clerk_dashboard') }}" class="btn-back-dashboard">
                ← Back to Dashboard
            </a>
        </div>

    </div>

</div>

{% endblock %}
